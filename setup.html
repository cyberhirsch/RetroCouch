<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Controller Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0d0d0f; --panel-bg: #1a1a1d; --panel-border: #333338; --accent-color: #F5D94D; --accent-success: #00FF7F; --text-color: #E4E4E7; --text-secondary: #888890; }
        body { font-family: 'JetBrains Mono', monospace; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-button { color: var(--text-secondary); text-decoration: none; border: 2px solid var(--panel-border); padding: 8px 16px; border-radius: 6px; transition: all 0.2s; }
        .back-button:hover { color: var(--accent-color); border-color: var(--accent-color); }
        .main-container { display: flex; gap: 20px; }
        .left-panel { flex: 1; } .right-panel { flex: 2; }
        .panel { background: var(--panel-bg); border: 2px solid var(--panel-border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .panel-title { font-size: 20px; font-weight: 700; color: var(--accent-color); margin-bottom: 15px; }
        .profile-actions { display: flex; gap: 10px; margin-bottom: 15px; }
        select, input, button { font-family: inherit; background: var(--bg-color); color: var(--text-color); border: 1px solid var(--panel-border); padding: 8px; border-radius: 4px; }
        button { cursor: pointer; }
        .control-mapping-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; }
        .control-mapping { display: flex; justify-content: space-between; align-items: center; }
        .map-button { min-width: 120px; text-align: center; }
        .map-button.listening { border-color: var(--accent-success); color: var(--accent-success); }
        .assignments .control-mapping { margin-bottom: 15px; }
        /* Visualizer styles are similar to before */
    </style>
</head>
<body>
    <div class="header"><h1>Universal Controller Setup</h1><a href="index.html" class="back-button">&larr; Back</a></div>

    <div class="main-container">
        <div class="left-panel">
            <div class="panel assignments">
                <div class="panel-title">Gamepad Assignments</div>
                <div id="assignments-container"></div>
            </div>
            <div class="panel profiles">
                <div class="panel-title">Profiles</div>
                <div class="profile-actions">
                    <select id="profile-selector"></select>
                    <button id="new-profile-btn">New</button>
                    <button id="delete-profile-btn">Delete</button>
                </div>
                <div class="panel-title">Edit Profile Mappings</div>
                <div class="control-mapping-grid" id="mapping-container"></div>
            </div>
        </div>
        <div class="right-panel">
            <div class="panel visualizer">
                <div class="panel-title">Live Controller Input</div>
                <div id="visualizer-panel"></div>
            </div>
        </div>
    </div>

    <script src="ControllerManager.js"></script>
    <script src="setup.js"></script>
</body>
</html>
